spring.application.name=IMS-Backend

spring.datasource.username=root
spring.datasource.password=rootroot

# JWT Security Configuration
jwt.secret=Qok7QmQ56WMVcfGsu4zdK91Huvjx7M1OajxtMSRDEBY=
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 1. Update the JDBC URL to use Asia/Kolkata
spring.datasource.url=jdbc:mysql://localhost:3306/imsdb?serverTimezone=Asia/Kolkata&useLegacyDatetimeCode=false

# 2. Tell Hibernate to use IST when communicating with the DB
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# 3. Tell Jackson to format the JSON output in IST
spring.jackson.time-zone=Asia/Kolkata