services:
  - type: web
    name: ims-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/IMS-Backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 21
      - key: DATABASE_URL
        fromDatabase:
          name: ims-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: JWT_HEADER
        value: Authorization
      - key: JWT_PREFIX
        value: Bearer

databases:
  - name: ims-database
    databaseName: imsdb
    user: ims_user
    plan: free
